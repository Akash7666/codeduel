<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CodeDuel — Login</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
  <div class="card">
    <h1>CodeDuel</h1>
    <p class="tagline">LeetCode is the gym. CodeDuel is the game.</p>

    <div class="error" id="error"></div>

    <!-- Login form -->
    <div id="login-form">
      <label>Email</label>
      <input type="email" id="login-email" placeholder="you@example.com">
      <label>Password</label>
      <input type="password" id="login-password" placeholder="••••••••">
      <button id="login-btn">Log in</button>
      <p class="toggle">No account? <a id="show-signup">Sign up</a></p>
    </div>

    <!-- Signup form (hidden by default) -->
    <div id="signup-form" style="display:none;">
      <label>Username</label>
      <input type="text" id="signup-username" placeholder="yourname">
      <label>Email</label>
      <input type="email" id="signup-email" placeholder="you@example.com">
      <label>Password</label>
      <input type="password" id="signup-password" placeholder="••••••••">
      <button id="signup-btn">Create account</button>
      <p class="toggle">Have an account? <a id="show-login">Log in</a></p>
    </div>
  </div>

  <script src="/static/js/api.js"></script>
  <script src="/static/js/login.js"></script>
</body>
</html>
