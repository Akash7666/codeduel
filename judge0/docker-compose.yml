services:
  server:
    image: judge0/judge0:1.13.1
    volumes:
      - ./judge0.conf:/judge0.conf:ro
    ports:
      - "2358:2358"
    privileged: true
    restart: always
    depends_on:
      - db
      - redis

  worker:
    image: judge0/judge0:1.13.1
    command: ["./scripts/workers"]
    volumes:
      - ./judge0.conf:/judge0.conf:ro
    privileged: true
    restart: always
    depends_on:
      - db
      - redis

  db:
    image: postgres:13
    environment:
      POSTGRES_USER: judge0
      POSTGRES_PASSWORD: judge0_pw
      POSTGRES_DB: judge0
    volumes:
      - judge0_pgdata:/var/lib/postgresql/data
    restart: always

  redis:
    image: redis:7
    command: ["redis-server", "--appendonly", "no", "--requirepass", "judge0_redis_pw"]
    restart: always

volumes:
  judge0_pgdata: