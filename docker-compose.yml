services:
  db:
    image: postgres:16
    container_name: codeduel-db
    environment:
      POSTGRES_USER: codeduel
      POSTGRES_PASSWORD: codeduel_dev_pw
      POSTGRES_DB: codeduel
    ports:
      - "5432:5432"
    volumes:
      - codeduel_pgdata:/var/lib/postgresql/data

volumes:
  codeduel_pgdata: